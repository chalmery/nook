name: Release

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '25'
  JAVAFX_VERSION: '26.0.1'
  VLC_VERSION: '3.0.21'

jobs:
  # ════════════════════════════════════════════════════════════════
  #  Linux — Debian / Ubuntu / Mint 系
  # ════════════════════════════════════════════════════════════════
  build-deb:
    name: linux-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-deb-${{ hashFiles('pom.xml') }}
          restore-keys: maven-deb-

      - name: Install VLC
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq vlc

      - name: Bundle VLC natives
        run: |
          SRC="/usr/lib/x86_64-linux-gnu"
          PLAT="linux-x86_64"
          mkdir -p "native/$PLAT"

          LIBVLC=$(basename "$(readlink -f "$SRC/libvlc.so.5")")
          LIBVLCCORE=$(basename "$(readlink -f "$SRC/libvlccore.so.9")")

          cp -L "$SRC/$LIBVLC"      "native/$PLAT/"
          cp -L "$SRC/$LIBVLCCORE"  "native/$PLAT/"
          cp -r "$SRC/vlc/plugins"  "native/$PLAT/plugins"

          cd "native/$PLAT"
          ln -sf "$LIBVLC"       libvlc.so.5
          ln -sf libvlc.so.5     libvlc.so
          ln -sf "$LIBVLCCORE"   libvlccore.so.9
          ln -sf libvlccore.so.9 libvlccore.so
          cd -

          echo "=== Bundled ($PLAT) ===" && du -sh "native/$PLAT/"

      - name: Build application
        run: |
          mvn package -DskipTests -q
          mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/deps -q
          cp target/nook-*.jar target/deps/

      - name: Download JavaFX jmods
        run: |
          curl -L -o javafx-jmods.zip \
            "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_linux-x64_bin-jmods.zip"
          unzip -q javafx-jmods.zip -d javafx-jmods && rm javafx-jmods.zip

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package (.deb)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAIN_JAR=$(basename target/deps/nook-*.jar)
          JMOD_DIR=$(ls -d javafx-jmods/javafx-jmods-*/ | head -1)

          jpackage \
            --name Nook \
            --app-version "${VERSION}" \
            --description "Podcast player" \
            --input target/deps \
            --main-jar "${MAIN_JAR}" \
            --main-class top.yangcc.NookApp \
            --type deb \
            --linux-package-name nook \
            --linux-deb-maintainer "nook@example.com" \
            --icon icon/nook-256x256.png \
            --app-content native/ \
            --module-path "${JMOD_DIR}" \
            --add-modules javafx.controls,javafx.base,javafx.graphics,java.net.http \
            --dest dist \
            --java-options "--enable-native-access=javafx.graphics,com.sun.jna" \
            --java-options "-Dprism.lcdtext=false" \
            --java-options "-Dprism.forceGPU=true" \
            --java-options "-Djavafx.ime=true" \
            --java-options "-XX:ErrorFile=logs/hs_err_pid%p.log"

          # Inject AppStream metainfo into DEB
          DEB_FILE=$(ls dist/nook_*.deb | head -1)
          mkdir -p repkg
          dpkg-deb -x "${DEB_FILE}" repkg/
          dpkg-deb -e "${DEB_FILE}" repkg/DEBIAN/
          rm -f repkg/DEBIAN/md5sums
          mkdir -p repkg/usr/share/metainfo
          cp assets/nook.metainfo.xml repkg/usr/share/metainfo/
          rm -f "${DEB_FILE}"
          dpkg-deb -b repkg "${DEB_FILE}"
          rm -rf repkg

          echo "=== .deb ===" && ls -lh dist/

      - name: Package (AppImage)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          APP_DIR="nook.AppDir"

          DEB=$(ls dist/nook_*.deb | head -1)
          mkdir -p "$APP_DIR"
          dpkg-deb -x "$DEB" "$APP_DIR/"
          cp -r "$APP_DIR/opt/nook/"* "$APP_DIR/"
          rm -rf "$APP_DIR/opt/"
          cp icon/nook-256x256.png "$APP_DIR/nook.png"

          cat > "$APP_DIR/AppRun" << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/bin/Nook" "$@"
          APPRUN
          chmod +x "$APP_DIR/AppRun"

          cat > "$APP_DIR/nook.desktop" << DESKTOP
          [Desktop Entry]
          Name=Nook
          Comment=Podcast player
          Exec=nook
          Icon=nook
          Type=Application
          Categories=AudioVideo;Audio;
          DESKTOP

          mkdir -p "$APP_DIR/usr/share/metainfo"
          cp assets/nook.metainfo.xml "$APP_DIR/usr/share/metainfo/nook.appdata.xml"

          wget -q -O appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          ARCH=x86_64 ./squashfs-root/AppRun "$APP_DIR" "dist/nook-${VERSION}.AppImage"

          rm -rf "$APP_DIR" appimagetool squashfs-root
          echo "=== AppImage ===" && ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: nook-linux-${{ steps.version.outputs.VERSION }}
          path: dist/*

  # ════════════════════════════════════════════════════════════════
  #  Linux — Fedora / RHEL / CentOS 系
  # ════════════════════════════════════════════════════════════════
  build-rpm:
    name: linux-rpm
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: /root/.m2
          key: maven-rpm-${{ hashFiles('pom.xml') }}
          restore-keys: maven-rpm-

      - name: Install VLC and tools
        run: |
          dnf install -y --setopt=install_weak_deps=False git
          dnf install -y --setopt=install_weak_deps=False \
            "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-$(rpm -E %fedora).noarch.rpm"
          dnf install -y --setopt=install_weak_deps=False \
            vlc maven rpm-build

      - name: Bundle VLC natives
        run: |
          SRC="/usr/lib64"
          PLAT="linux-x86_64"
          mkdir -p "native/$PLAT"

          LIBVLC=$(basename "$(readlink -f "$SRC/libvlc.so.5")")
          LIBVLCCORE=$(basename "$(readlink -f "$SRC/libvlccore.so.9")")

          cp -L "$SRC/$LIBVLC"      "native/$PLAT/"
          cp -L "$SRC/$LIBVLCCORE"  "native/$PLAT/"
          cp -r "$SRC/vlc/plugins"  "native/$PLAT/plugins"

          cd "native/$PLAT"
          ln -sf "$LIBVLC"       libvlc.so.5
          ln -sf libvlc.so.5     libvlc.so
          ln -sf "$LIBVLCCORE"   libvlccore.so.9
          ln -sf libvlccore.so.9 libvlccore.so
          cd -

          echo "=== Bundled ($PLAT) ===" && du -sh "native/$PLAT/"

      - name: Build application
        run: |
          mvn package -DskipTests -q
          mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/deps -q
          cp target/nook-*.jar target/deps/

      - name: Download JavaFX jmods
        run: |
          curl -L -o javafx-jmods.zip \
            "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_linux-x64_bin-jmods.zip"
          unzip -q javafx-jmods.zip -d javafx-jmods && rm javafx-jmods.zip

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package (.rpm)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAIN_JAR=$(basename target/deps/nook-*.jar)
          JMOD_DIR=$(ls -d javafx-jmods/javafx-jmods-*/ | head -1)

          jpackage \
            --name Nook \
            --app-version "${VERSION}" \
            --description "Podcast player" \
            --input target/deps \
            --main-jar "${MAIN_JAR}" \
            --main-class top.yangcc.NookApp \
            --type rpm \
            --linux-package-name nook \
            --icon icon/nook-256x256.png \
            --app-content native/ \
            --module-path "${JMOD_DIR}" \
            --add-modules javafx.controls,javafx.base,javafx.graphics,java.net.http \
            --dest dist \
            --java-options "--enable-native-access=javafx.graphics,com.sun.jna" \
            --java-options "-Dprism.lcdtext=false" \
            --java-options "-Dprism.forceGPU=true" \
            --java-options "-Djavafx.ime=true" \
            --java-options "-XX:ErrorFile=logs/hs_err_pid%p.log"

          # Inject AppStream metainfo — GNOME Software needs this
          RPM_FILE=$(ls dist/nook-*.rpm | head -1)
          mkdir -p repkg && cd repkg
          rpm2cpio "../${RPM_FILE}" | cpio -idmv 2>/dev/null
          mkdir -p usr/share/metainfo
          cp ../assets/nook.metainfo.xml usr/share/metainfo/

          # Generate file list (relative to spec)
          find . \( -type f -o -type l \) -not -name 'nook.spec' | sed 's|^\.||' | sort > files.list

          cat > nook.spec << EOF
          Name:           nook
          Version:        ${VERSION}
          Release:        1
          Summary:        Podcast player
          License:        MIT

          %description
          A modern desktop podcast player built with JavaFX.
          Browse, search, and subscribe to your favorite podcasts.

          %files -f $PWD/files.list
          EOF

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          rpmbuild -bb --buildroot="$(pwd)" \
            --define "_topdir $(pwd)/rpmbuild" \
            nook.spec

          cp rpmbuild/RPMS/*/nook-*.rpm ../dist/
          cd .. && rm -rf repkg

          echo "=== Package ===" && ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: nook-linux-rpm-${{ steps.version.outputs.VERSION }}
          path: dist/*

  # ════════════════════════════════════════════════════════════════
  #  macOS — Apple Silicon
  # ════════════════════════════════════════════════════════════════
  build-macos:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm
            runner: macos-latest
            javafx-arch: osx-aarch64
            vlc-arch: arm64
            platform: macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ matrix.name }}-${{ hashFiles('pom.xml') }}
          restore-keys: maven-${{ matrix.name }}-

      - name: Download and extract VLC
        run: |
          VLC_URL="https://get.videolan.org/vlc/${{ env.VLC_VERSION }}/macosx/vlc-${{ env.VLC_VERSION }}-${{ matrix.vlc-arch }}.dmg"
          echo "Downloading $VLC_URL"
          curl -L -o vlc.dmg "$VLC_URL"

          hdiutil attach vlc.dmg -mountpoint /tmp/vlc-mount -nobrowse -quiet

          mkdir -p "native/${{ matrix.platform }}"
          cp /tmp/vlc-mount/VLC.app/Contents/MacOS/lib/libvlc.dylib     "native/${{ matrix.platform }}/"
          cp /tmp/vlc-mount/VLC.app/Contents/MacOS/lib/libvlccore.dylib "native/${{ matrix.platform }}/"
          cp -r /tmp/vlc-mount/VLC.app/Contents/MacOS/plugins           "native/${{ matrix.platform }}/plugins"

          hdiutil detach /tmp/vlc-mount -quiet && rm -f vlc.dmg
          echo "=== Bundled (${{ matrix.platform }}) ===" && du -sh "native/${{ matrix.platform }}/"

      - name: Build application
        run: |
          mvn package -DskipTests -q
          mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/deps -q
          cp target/nook-*.jar target/deps/

      - name: Download JavaFX jmods
        run: |
          curl -L -o javafx-jmods.zip \
            "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_${{ matrix.javafx-arch }}_bin-jmods.zip"
          unzip -q javafx-jmods.zip -d javafx-jmods && rm javafx-jmods.zip

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate ICNS icon
        run: |
          mkdir -p nook.iconset
          cp icon/nook-16x16.png   nook.iconset/icon_16x16.png
          cp icon/nook-32x32.png   nook.iconset/icon_16x16@2x.png
          cp icon/nook-32x32.png   nook.iconset/icon_32x32.png
          cp icon/nook-64x64.png   nook.iconset/icon_32x32@2x.png
          cp icon/nook-128x128.png nook.iconset/icon_128x128.png
          cp icon/nook-256x256.png nook.iconset/icon_128x128@2x.png
          cp icon/nook-256x256.png nook.iconset/icon_256x256.png
          iconutil -c icns nook.iconset -o icon/nook.icns
          rm -rf nook.iconset

      - name: Package (.dmg)
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAIN_JAR=$(basename target/deps/nook-*.jar)
          JMOD_DIR=$(ls -d javafx-jmods/javafx-jmods-*/ | head -1)

          jpackage \
            --name Nook \
            --app-version "${VERSION}" \
            --description "Podcast player" \
            --input target/deps \
            --main-jar "${MAIN_JAR}" \
            --main-class top.yangcc.NookApp \
            --type dmg \
            --icon icon/nook.icns \
            --app-content native/ \
            --module-path "${JMOD_DIR}" \
            --add-modules javafx.controls,javafx.base,javafx.graphics,java.net.http \
            --dest dist \
            --java-options "--enable-native-access=javafx.graphics,com.sun.jna" \
            --java-options "-Dprism.lcdtext=false" \
            --java-options "-Dprism.forceGPU=true" \
            --java-options "-Djavafx.ime=true" \
            --java-options "-XX:ErrorFile=logs/hs_err_pid%p.log"

          echo "=== Package ===" && ls -lh dist/
          mv dist/Nook-*.dmg "dist/nook-${VERSION}.dmg"
          echo "=== Final ===" && ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: nook-${{ matrix.name }}-${{ steps.version.outputs.VERSION }}
          path: dist/*

  # ════════════════════════════════════════════════════════════════
  #  Windows
  # ════════════════════════════════════════════════════════════════
  build-windows:
    name: windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-windows-${{ hashFiles('pom.xml') }}
          restore-keys: maven-windows-

      - name: Install VLC and Maven
        shell: pwsh
        run: |
          choco install vlc maven -y --no-progress
          $dest = "native/windows-x86_64"
          New-Item -ItemType Directory -Force -Path "$dest"
          Copy-Item "C:\Program Files\VideoLAN\VLC\libvlc.dll"     "$dest\"
          Copy-Item "C:\Program Files\VideoLAN\VLC\libvlccore.dll" "$dest\"
          Copy-Item "C:\Program Files\VideoLAN\VLC\plugins"        "$dest\plugins" -Recurse
          Write-Host "=== Bundled (windows-x86_64) ==="
          Get-ChildItem "$dest" | Select-Object Name,Length

      - name: Build application
        run: |
          mvn package -DskipTests -q
          mvn dependency:copy-dependencies -DincludeScope=runtime -DoutputDirectory=target/deps -q
          Copy-Item target/nook-*.jar target/deps/

      - name: Download JavaFX jmods
        shell: pwsh
        run: |
          curl -L -o javafx-jmods.zip `
            "https://download2.gluonhq.com/openjfx/${{ env.JAVAFX_VERSION }}/openjfx-${{ env.JAVAFX_VERSION }}_windows-x64_bin-jmods.zip"
          Expand-Archive -Path javafx-jmods.zip -DestinationPath javafx-jmods
          Remove-Item javafx-jmods.zip

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate ICO icon
        run: |
          pip install Pillow --quiet
          python -c "from PIL import Image; Image.open('icon/nook-256x256.png').save('icon/nook.ico', format='ICO')"

      - name: Package (.msi + .exe)
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"
          $MAIN_JAR = (Get-ChildItem target/deps/nook-*.jar | Select-Object -First 1).Name
          $JMOD_DIR = (Get-ChildItem -Directory javafx-jmods/javafx-jmods-* | Select-Object -First 1).FullName

          $commonArgs = @(
            '--name', 'Nook',
            '--app-version', $VERSION,
            '--description', 'Podcast player',
            '--input', 'target/deps',
            '--main-jar', $MAIN_JAR,
            '--main-class', 'top.yangcc.NookApp',
            '--icon', 'icon/nook.ico',
            '--win-menu',
            '--win-menu-group', 'Nook',
            '--app-content', 'native/',
            '--module-path', $JMOD_DIR,
            '--add-modules', 'javafx.controls,javafx.base,javafx.graphics,java.net.http',
            '--dest', 'dist',
            '--java-options', '--enable-native-access=javafx.graphics,com.sun.jna',
            '--java-options', '-Dprism.lcdtext=false',
            '--java-options', '-Dprism.forceGPU=true',
            '--java-options', '-Djavafx.ime=true',
            '--java-options', '-XX:ErrorFile=logs/hs_err_pid%p.log'
          )

          jpackage @($commonArgs + @('--type', 'msi'))
          jpackage @($commonArgs + @('--type', 'exe'))

          Get-ChildItem dist/Nook-* | ForEach-Object {
            $new = $_.Name -replace '^Nook', 'nook'
            Rename-Item $_.FullName $new
          }

          echo "=== Package ==="
          Get-ChildItem dist/

      - uses: actions/upload-artifact@v4
        with:
          name: nook-windows-${{ steps.version.outputs.VERSION }}
          path: dist/*

  # ════════════════════════════════════════════════════════════════
  #  GitHub Release
  # ════════════════════════════════════════════════════════════════
  create-release:
    name: Create Release
    needs: [build-deb, build-rpm, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: nook ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
